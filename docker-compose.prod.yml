# omnilearn.space — Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yml up -d --build

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-omnilearn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-omnilearn}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - omnilearn-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-omnilearn}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-omnilearn}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-omnilearn}
      NODE_ENV: production
      PORT: "4000"
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://omnilearn.space,https://www.omnilearn.space}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      LINKEDIN_CLIENT_ID: ${LINKEDIN_CLIENT_ID:-}
      LINKEDIN_CLIENT_SECRET: ${LINKEDIN_CLIENT_SECRET:-}
      LINKEDIN_CALLBACK_URL: ${LINKEDIN_CALLBACK_URL:-https://omnilearn.space/auth/linkedin/callback}
      LINKEDIN_SERVER_CALLBACK_URL: ${LINKEDIN_SERVER_CALLBACK_URL:-https://omnilearn.space/api/auth/linkedin/callback}
      SMTP_URL: ${SMTP_URL:-}
      MAIL_FROM: ${MAIL_FROM:-}
      EMAIL_ENCRYPTION_KEY: ${EMAIL_ENCRYPTION_KEY:-}
      UNSUBSCRIBE_SECRET: ${UNSUBSCRIBE_SECRET:-}
      FRONTEND_URL: ${FRONTEND_URL:-https://omnilearn.space}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      LIGHTFM_SERVICE_URL: http://recommendations:5000
      VIDEO_PROXY_SERVICE_URL: http://video-proxy:5001
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-}
      # Required for BullMQ (geo rollups, etc.); without this the backend targets 127.0.0.1 and nginx may return HTML 502s.
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    volumes:
      - backend_data:/app/data
    networks:
      - omnilearn-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - omnilearn-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  video-proxy:
    build:
      context: ./video-proxy
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379/0
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-}
      YTDLP_MAX_QUALITY: ${YTDLP_MAX_QUALITY:-720p}
      YTDLP_COOKIES_PATH: ${YTDLP_COOKIES_PATH:-}
      YTDLP_BROWSER_COOKIES: ${YTDLP_BROWSER_COOKIES:-}
      VIDEO_CACHE_TTL_HOURS: "5"
      PORT: "5001"
    volumes:
      - ./video-proxy/cookies:/app/cookies:ro
    networks:
      - omnilearn-net

  recommendations:
    build:
      context: ./recommendations
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      OMNILEARN_API_URL: http://backend:4000
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-}
      MODEL_PATH: /app/data/model.pkl
    volumes:
      - recommendations_data:/app/data
    networks:
      - omnilearn-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://omnilearn.space/api}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
        NEXT_PUBLIC_LINKEDIN_CLIENT_ID: ${NEXT_PUBLIC_LINKEDIN_CLIENT_ID:-}
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - omnilearn-net

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    networks:
      - omnilearn-net

  certbot:
    image: certbot/certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  redis_data:
  backend_data:
  recommendations_data:

networks:
  omnilearn-net:
    driver: bridge
