# omnilearn.space — CI Pipeline
# Runs on every push and PR: lint, test, and verify Docker builds

name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint -w frontend

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Setup local database
        run: npm run db:setup:local
        working-directory: backend
        env:
          DATABASE_URL: file:./prisma/dev.db

      - name: Run backend tests
        run: npm test --prefix backend --if-present

  build-docker:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t omnilearn-backend:ci ./backend

      - name: Build frontend image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=https://omnilearn.space/api \
            -t omnilearn-frontend:ci \
            ./frontend
