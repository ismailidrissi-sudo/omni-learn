# omnilearn.space — CD Pipeline
# Deploys to Hostinger VPS via SSH + Docker Compose
#
# Triggers:
#   - Push to master (automatic)
#   - Manual dispatch (trigger from Cursor terminal or GitHub UI)
#
# Required GitHub Secrets:
#   DEPLOY_HOST       — VPS IP (187.124.42.35)
#   DEPLOY_USER       — SSH user (root or deploy user)
#   DEPLOY_SSH_KEY    — Private SSH key for the VPS
#   POSTGRES_PASSWORD — Production database password
#   JWT_SECRET        — JWT signing secret
#
# Optional GitHub Secrets:
#   GOOGLE_CLIENT_ID, LINKEDIN_CLIENT_ID, LINKEDIN_CLIENT_SECRET
#   SMTP_URL, MAIL_FROM, STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET
#   NEXT_PUBLIC_GOOGLE_CLIENT_ID, NEXT_PUBLIC_LINKEDIN_CLIENT_ID

name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  APP_DIR: /opt/omnilearn

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: APP_DIR
          script: |
            set -e

            cd $APP_DIR

            echo "==> Pulling latest code..."
            git pull origin master

            echo "==> Writing production .env..."
            cat > .env << 'ENVEOF'
            POSTGRES_USER=omnilearn
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=omnilearn
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            CORS_ORIGINS=https://omnilearn.space,https://www.omnilearn.space
            FRONTEND_URL=https://omnilearn.space
            NEXT_PUBLIC_API_URL=https://omnilearn.space/api
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            LINKEDIN_CLIENT_ID=${{ secrets.LINKEDIN_CLIENT_ID }}
            LINKEDIN_CLIENT_SECRET=${{ secrets.LINKEDIN_CLIENT_SECRET }}
            LINKEDIN_CALLBACK_URL=https://omnilearn.space/auth/linkedin/callback
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
            NEXT_PUBLIC_LINKEDIN_CLIENT_ID=${{ secrets.NEXT_PUBLIC_LINKEDIN_CLIENT_ID }}
            SMTP_URL=${{ secrets.SMTP_URL }}
            MAIL_FROM=${{ secrets.MAIL_FROM }}
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
            STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
            ENVEOF

            echo "==> Building and starting containers..."
            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans

            echo "==> Waiting for backend to be ready..."
            sleep 10

            echo "==> Running database schema sync..."
            docker compose -f docker-compose.prod.yml exec -T backend node node_modules/prisma/build/index.js db push --skip-generate

            echo "==> Cleaning up old images..."
            docker image prune -f

            echo "==> Deploy complete!"
