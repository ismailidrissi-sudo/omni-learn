# omnilearn.space — CD Pipeline
# Deploys to Hostinger VPS via SSH + Docker Compose
#
# Retries SSH (nick-fields/retry): GitHub Actions egress IPs change; some networks
# intermittently time out TCP :22 — several attempts with backoff usually succeeds.
#
# Triggers:
#   - Push to master (automatic)
#   - Manual dispatch
#
# Secrets: see repository Settings → Secrets (DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, …)
# Optional: DEPLOY_PORT if SSH is not on 22

name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  APP_DIR: /opt/omnilearn

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for scripts/ci/*)
        uses: actions/checkout@v4

      - name: Build production .env on runner
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
          NEXT_PUBLIC_LINKEDIN_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_LINKEDIN_CLIENT_ID }}
          INTERNAL_SERVICE_KEY: ${{ secrets.INTERNAL_SERVICE_KEY }}
          EMAIL_ENCRYPTION_KEY: ${{ secrets.EMAIL_ENCRYPTION_KEY }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          YTDLP_COOKIES_PATH: ${{ secrets.YTDLP_COOKIES_PATH }}
          IPINFO_TOKEN: ${{ secrets.IPINFO_TOKEN }}
        run: bash scripts/ci/write-prod-env.sh /tmp/prod.env

      - name: Push .env + pull + Docker rollout (SSH, with retries)
        uses: nick-fields/retry@v3
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        with:
          timeout_minutes: 45
          max_attempts: 5
          retry_wait_seconds: 90
          command: |
            set -euo pipefail
            PORT="${DEPLOY_PORT:-22}"
            mkdir -p ~/.ssh
            chmod 700 ~/.ssh
            echo "${{ secrets.DEPLOY_SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key
            ssh-keyscan -p "$PORT" -T 60 "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

            # ssh uses -p for port; scp uses -P
            SSH_OPTS=( -i ~/.ssh/deploy_key
              -o BatchMode=yes
              -o StrictHostKeyChecking=accept-new
              -o ConnectTimeout=90
              -o ConnectionAttempts=5
              -o TCPKeepAlive=yes
              -o ServerAliveInterval=30
              -o ServerAliveCountMax=12
              -p "$PORT" )
            SCP_OPTS=( -i ~/.ssh/deploy_key
              -o BatchMode=yes
              -o StrictHostKeyChecking=accept-new
              -o ConnectTimeout=90
              -P "$PORT" )

            scp "${SCP_OPTS[@]}" /tmp/prod.env "${DEPLOY_USER}@${DEPLOY_HOST}:${{ env.APP_DIR }}/.env"

            ssh "${SSH_OPTS[@]}" \
              "${DEPLOY_USER}@${DEPLOY_HOST}" \
              "cd ${{ env.APP_DIR }} && git pull origin master && bash scripts/ci/vps-rollout.sh"
