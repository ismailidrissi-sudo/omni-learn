upstream frontend {
    server frontend:3000;
}

upstream backend {
    server backend:4000;
}

# Redirect HTTP -> HTTPS
server {
    listen 80;
    server_name omnilearn.space www.omnilearn.space;

    # Let Certbot handle ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Redirect www -> apex
server {
    listen 443 ssl;
    http2 on;
    server_name www.omnilearn.space;

    ssl_certificate     /etc/letsencrypt/live/omnilearn.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/omnilearn.space/privkey.pem;

    return 301 https://omnilearn.space$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl;
    http2 on;
    server_name omnilearn.space;

    # SSL
    ssl_certificate     /etc/letsencrypt/live/omnilearn.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/omnilearn.space/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    client_max_body_size 50M;

    # Backend API
    location /api/ {
        proxy_pass http://backend/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 90s;
        proxy_buffering off;
    }

    # Frontend (everything else)
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }

    # Next.js static assets
    location /_next/static/ {
        proxy_pass http://frontend;
        proxy_cache_valid 200 60d;
        add_header Cache-Control "public, immutable, max-age=5184000";
    }
}
